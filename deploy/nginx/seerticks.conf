# Seerticks nginx - reverse proxy to node app on :3000 with WebSocket upgrade

# Rate limit zone for auth/API abuse protection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name seerticks.com www.seerticks.com;

    # Let's Encrypt HTTP-01 challenge path (must stay on :80)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 25m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Main reverse proxy
    location / {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for trading WS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Don't buffer streamed responses (SSE/WS)
        proxy_buffering off;
    }
}
