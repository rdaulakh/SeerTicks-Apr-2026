<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="%VITE_APP_LOGO%" />
    <title>%VITE_APP_TITLE%</title>
    <!-- Google Fonts: Inter (UI) + JetBrains Mono (Data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami analytics — only injected when both env vars are set at build time.
         Prevents a broken /umami request (and "Unexpected token '<'" parse error)
         when VITE_ANALYTICS_ENDPOINT is undefined. -->
    <script>
      (function () {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (!endpoint || !websiteId) return;
        if (endpoint.charAt(0) === "%" || websiteId.charAt(0) === "%") return;
        var s = document.createElement("script");
        s.defer = true;
        s.src = endpoint.replace(/\/$/, "") + "/umami";
        s.setAttribute("data-website-id", websiteId);
        document.body.appendChild(s);
      })();
    </script>
  </body>

</html>
